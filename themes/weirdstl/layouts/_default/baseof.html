<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  {{ partial "head.html" . }}
  <script>
    (function() {
      var saved = localStorage.getItem('weirdstl-theme');
      document.documentElement.setAttribute('data-theme', saved || 'dark');
    })();
    function toggleTheme() {
      var html = document.documentElement;
      var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('weirdstl-theme', next);
      var btn = document.getElementById('theme-toggle');
      if (btn) btn.textContent = next === 'dark' ? '☀' : '☾';
    }
    function toggleSearch() {
      var panel = document.getElementById('search-panel');
      var isOpen = panel.classList.toggle('is-open');
      if (isOpen) {
        setTimeout(function() {
          var input = panel.querySelector('.pagefind-ui__search-input');
          if (input) input.focus();
        }, 50);
      }
    }
    function handleShare(btn) {
      var url = btn.dataset.url;
      var title = btn.dataset.title;
      if (navigator.share) {
        navigator.share({ title: title, url: url }).catch(function() {});
      } else {
        navigator.clipboard.writeText(url).then(function() {
          var orig = btn.getAttribute('aria-label');
          btn.setAttribute('aria-label', 'Copied!');
          btn.classList.add('share-icon-btn--copied');
          setTimeout(function() {
            btn.setAttribute('aria-label', orig);
            btn.classList.remove('share-icon-btn--copied');
          }, 1500);
        });
      }
    }
    function copyShareLink(btn) {
      navigator.clipboard.writeText(btn.dataset.url).then(function() {
        var orig = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(function() { btn.textContent = orig; }, 1500);
      });
    }
    window.addEventListener('DOMContentLoaded', function() {
      if (typeof PagefindUI !== 'undefined') {
        new PagefindUI({ element: '#search', showImages: false, excerptLength: 20 });
      }
    });
  </script>
</head>
<body>
  {{ partial "masthead.html" . }}
  {{ partial "nav.html" . }}
  <div id="search-panel" class="search-panel">
    <div id="search"></div>
  </div>
  <main class="site-main">
    {{- block "main" . }}{{- end }}
  </main>
  {{ partial "footer.html" . }}
</body>
</html>
