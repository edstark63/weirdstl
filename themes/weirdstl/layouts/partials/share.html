<div class="share-bar">
  <span class="share-bar__label">Share</span>
  <a class="share-bar__link" href="https://twitter.com/intent/tweet?url={{ .Permalink | urlquery }}&text={{ .Title | urlquery }}" target="_blank" rel="noopener">X&nbsp;/&nbsp;Twitter</a>
  <a class="share-bar__link" href="https://www.facebook.com/sharer/sharer.php?u={{ .Permalink | urlquery }}" target="_blank" rel="noopener">Facebook</a>
  <button class="share-bar__link share-bar__copy" onclick="copyShareLink(this)" data-url="{{ .Permalink }}">Copy link</button>
</div>
